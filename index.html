<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Güler Mutfak Lezzetleri</title>

  <link rel="icon" type="image/png" href="images/guler_logo.png">
  <link rel="apple-touch-icon" href="images/guler_logo.png">

  <!-- Firebase kütüphaneleri -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Poppins:wght@400;500;700&display=swap');

    /* Genel Tasarım */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', 'Poppins', sans-serif;
      background: #fffaf5; 
      color: #4a4a4a;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      transition: background 0.3s, color 0.3s;
      scroll-behavior: smooth;
    }
    body.dark-mode { background: #1a1a1a; color: #f0f0f0; }
    
    /* Yükleme Ekranı */
    #page-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fffaf5; z-index: 9999; display: flex; flex-direction: column;
      justify-content: center; align-items: center; transition: opacity 0.5s ease-out, visibility 0.5s;
    }
    body.dark-mode #page-loader { background: #1a1a1a; }
    .spinning-plate { font-size: 5rem; animation: spin-plate 2s linear infinite; }
    @keyframes spin-plate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { margin-top: 20px; font-size: 1.3rem; font-weight: 800; color: #ff7e5f; letter-spacing: 2px; animation: blink 1.5s infinite; }

    /* Header & Kontroller */
    header {
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: #fff; padding: 2rem 1.5rem; text-align: center; position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 4px 20px rgba(255, 126, 95, 0.3); display: flex; flex-direction: column;
      align-items: center; gap: 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
    }
    .header-title { font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); cursor: pointer; user-select: none; }

    .top-left-controls { position: absolute; top: 20px; left: 20px; display: flex; gap: 8px; z-index: 1002; }
    .top-btn {
      padding: 8px 16px; font-size: 0.85rem; font-weight: bold; background: rgba(255, 255, 255, 0.2);
      color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; cursor: pointer; transition: 0.3s;
    }
    .top-btn:hover { background: rgba(255, 255, 255, 0.4); }

    .cart-trigger {
      position: fixed; top: 20px; right: 20px; z-index: 1001; background: white; width: 55px; height: 55px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cart-trigger:hover { transform: scale(1.1); }
    .cart-trigger svg { width: 28px; height: 28px; fill: #ff7e5f; }
    .cart-badge {
      position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; font-size: 0.8rem; font-weight: 800;
      min-width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      padding: 0 5px; border: 2px solid white; opacity: 0; transform: scale(0); transition: 0.3s;
    }
    .cart-badge.active { opacity: 1; transform: scale(1); }

    #campaign-text {
      background: rgba(255, 255, 255, 0.25); color: white; padding: 10px 30px; font-size: 1.1rem; font-weight: 800;
      border-radius: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.4); 
      cursor: pointer; animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Arama ve Kategori */
    .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 2rem 1rem; max-width: 1000px; margin: 0 auto; }
    .search-box { width: 100%; max-width: 600px; }
    .search-box input {
      width: 100%; padding: 16px 25px; font-size: 1.1rem; border: 2px solid #ffe0d2; border-radius: 40px; 
      color: #333; background: #fff; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.3s;
    }
    .search-box input:focus { border-color: #ff7e5f; box-shadow: 0 5px 20px rgba(255,126,95,0.15); }
    body.dark-mode .search-box input { background: #2a2a2a; color: #fff; border-color: #444; }

    .category-tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; width: 100%; }
    .tab-btn {
      padding: 12px 25px; border: 2px solid #ff7e5f; background: transparent; color: #ff7e5f;
      border-radius: 35px; cursor: pointer; font-weight: 700; transition: 0.3s; font-family: inherit; font-size: 1rem;
    }
    .tab-btn.active { background: #ff7e5f; color: white; box-shadow: 0 4px 15px rgba(255,126,95,0.3); }

    /* Ürün Listesi */
    .section-title { width: 100%; text-align: center; margin: 3rem 0 1.5rem; font-size: 2rem; font-weight: 800; color: #ff7e5f; display: flex; align-items: center; justify-content: center; gap: 15px; }
    .section-title::before, .section-title::after { content: ""; flex: 1; height: 3px; background: #ffe0d2; max-width: 120px; border-radius: 10px; }
    .fav-title { color: #f1c40f; }

    #products { display: flex; flex-wrap: wrap; justify-content: center; padding: 1.5rem; gap: 30px; max-width: 1300px; margin: 0 auto; }
    
    /* Favoriler PC Navigasyon */
    #favorites-container { position: relative; max-width: 1350px; margin: 0 auto; padding: 0 50px; }
    #favorites-section {
      display: flex; flex-wrap: nowrap; overflow-x: auto; padding: 2rem 0; gap: 25px;
      scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    #favorites-section::-webkit-scrollbar { display: none; }
    #favorites-section .flip-card { flex: 0 0 300px; scroll-snap-align: start; }

    .fav-nav-btn {
      position: absolute; top: 55%; transform: translateY(-50%); width: 50px; height: 50px;
      background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15); cursor: pointer; z-index: 50; border: none; font-size: 1.5rem; color: #ff7e5f; transition: 0.3s;
    }
    .fav-nav-btn:hover { background: #ff7e5f; color: white; transform: translateY(-50%) scale(1.1); }
    .fav-prev { left: 0; } .fav-next { right: 0; }

    /* Kart Tasarımı ve Hover/Büyüme Efekti */
    .flip-card { 
      background: transparent; width: 300px; height: 450px; perspective: 1200px; cursor: pointer; position: relative; 
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), z-index 0.3s; 
    }
    
    .flip-card:hover, .flip-card.is-hovered { transform: scale(1.05); z-index: 100; }
    .flip-card.active-card { z-index: 100; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
    .flip-card-inner.flipped { transform: rotateY(180deg); }
    
    .flip-card-front, .flip-card-back { 
      position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; 
      border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); background: #fff; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(0,0,0,0.04); 
    }
    .flip-card-back { transform: rotateY(180deg); padding: 20px; justify-content: flex-start; align-items: center; }
    body.dark-mode .flip-card-front, body.dark-mode .flip-card-back { background: #242424; color: #f0f0f0; border-color: #333; }
    
    .card-image-container { width: 100%; height: 210px; position: relative; overflow: hidden; }
    .card-image-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    
    /* Carousel ve Dots */
    .carousel { position: relative; width: 100%; height: 100%; touch-action: pan-y; }
    .carousel img { position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.4s ease-in-out; width: 100%; height: 100%; }
    .carousel img.active { opacity: 1; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 8px; z-index: 10; font-size: 1rem; }
    .carousel-btn.left { left: 8px; } .carousel-btn.right { right: 8px; }

    .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 15; }
    .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
    .dot.active { background: white; transform: scale(1.3); box-shadow: 0 0 5px rgba(0,0,0,0.3); }

    /* Rozetler */
    .discount-tag, .favorite-badge { transition: opacity 0.3s, visibility 0.3s; z-index: 20; }
    .flip-card-inner.flipped .discount-tag, .flip-card-inner.flipped .favorite-badge { opacity: 0; visibility: hidden; }
    .discount-tag { position: absolute; top: 15px; right: -5px; background: #e74c3c; color: white; padding: 6px 18px; font-size: 0.85rem; font-weight: bold; border-radius: 20px; box-shadow: 0 4px 10px rgba(231,76,60,0.3); }
    .favorite-badge { position: absolute; top: 15px; left: 10px; background: #f1c40f; color: #333; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; display: flex; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    .card-content { padding: 20px 15px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
    .card-content h3 { font-size: 1.2rem; color: #2c3e50; font-weight: 800; line-height: 1.2; }
    body.dark-mode .card-content h3 { color: #fff; }
    .discount-price-area { font-size: 1.4rem; font-weight: 800; color: #27ae60; margin: 5px 0; }
    .original-price { text-decoration: line-through; color: #aaa; font-size: 0.9rem; }
    .add-to-cart-btn { background: #ff7e5f; color: white; padding: 12px; font-size: 1.05rem; border: none; border-radius: 15px; cursor: pointer; width: 90%; margin: 0 auto; font-weight: bold; transition: 0.3s; }
    .add-to-cart-btn:hover { background: #e86b4c; transform: translateY(-3px); box-shadow: 0 6px 15px rgba(255,126,95,0.3); }

    /* Kart Arkası Metin Sığdırma */
    .flip-card-back h3 { margin-bottom: 15px; color: #ff7e5f; font-size: 1.4rem; flex-shrink: 0; font-weight: 800;}
    .desc-content { 
      font-size: 1rem; line-height: 1.6; color: #555; font-weight: 500; 
      overflow-y: auto; max-height: 100%; width: 100%; padding: 10px; 
      scrollbar-width: thin; scrollbar-color: #ff7e5f transparent; text-align: center; flex-grow: 1;
    }
    body.dark-mode .desc-content { color: #ccc; }

    /* Yönetici Kontrolleri */
    .admin-card-controls { position: absolute; bottom: -55px; left: 0; width: 100%; display: flex; justify-content: space-between; gap: 8px; padding: 0 10px; z-index: 10; }
    .admin-card-controls button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
    .admin-edit-btn { background: #f39c12; } .admin-del-btn { background: #c0392b; }
    .admin-move-btn { background: #34495e; flex: 0.4; font-size: 1.2rem; }

    /* Modal / Admin Formu */
    #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
    .admin-content { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; color: #333; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .admin-content h2 { margin-bottom: 25px; color: #2c3e50; text-align: center; font-weight: 800; font-size: 1.8rem; }
    .admin-form-group { margin-bottom: 20px; display: flex; flex-direction: column; text-align: left;}
    .admin-form-group label { font-weight: 800; margin-bottom: 8px; color: #ff7e5f; font-size: 0.95rem; }
    .admin-form-group input, .admin-form-group select, .admin-form-group textarea { padding: 14px; border: 2px solid #eee; border-radius: 15px; width: 100%; font-family: inherit; font-size: 1rem; transition: 0.3s; }
    .admin-form-group input:focus { border-color: #ff7e5f; outline: none; background: #fffaf5; }
    .image-preview-container { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; background: #f9f9f9; padding: 10px; border-radius: 15px; }
    .image-preview-item { position: relative; width: 85px; height: 85px; border-radius: 12px; overflow: hidden; border: 2px solid #ddd; }
    .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .image-preview-item button { position: absolute; top: 2px; right: 2px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; font-weight: bold; }

    #floating-add-btn { display: none; position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #8e44ad; color: white; border-radius: 50%; font-size: 35px; border: none; z-index: 1000; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.3); font-weight: bold; }
    #floating-logout-btn { display: none; position: fixed; bottom: 30px; left: 30px; padding: 12px 25px; border-radius: 30px; background: #c0392b; color: white; border: none; z-index: 1000; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

    /* Sepet & Bildirim */
    #cart { background: #fff; padding: 2.5rem; margin: 4rem auto 2rem; max-width: 750px; border-radius: 25px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.06); }
    body.dark-mode #cart { background: #242424; color: #f0f0f0; }
    .remove-button { background: #ffebee; color: #e74c3c; border: none; padding: 6px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .remove-button:hover { background: #e74c3c; color: white; }
    #total-price { font-weight: 800; font-size: 1.8rem; margin-top: 1.5rem; color: #27ae60; border-top: 2px dashed #eee; padding-top: 1.5rem; }
    
    .action-btn { width: 100%; max-width: 400px; background: #ff7e5f; color: #fff; padding: 14px 20px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-top: 10px; }
    .order-btn { background: #2ecc71; } .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    
    #notification { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 16px 40px; border-radius: 40px; display: none; z-index: 4000; font-weight: bold; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); }

    /* Mobil Düzeni */
    @media (max-width: 768px) {
      .header-title { font-size: 1.6rem; }
      #products { padding: 1rem 0.5rem; gap: 10px; }
      #products .flip-card { width: calc(50% - 5px); height: 380px; max-width: none; margin-bottom: 10px; }
      
      #favorites-container { padding: 0 10px; }
      #favorites-section .flip-card { flex: 0 0 85%; height: 380px; margin-bottom: 0;}
      .fav-nav-btn { display: none; } 
      
      .flip-card.active-card .flip-card-inner { transform: rotateY(180deg); }
      .flip-card:hover, .flip-card.is-hovered { transform: scale(1.05); z-index: 100; }
      
      .card-image-container { height: 130px; }
      .card-content { padding: 10px 6px; }
      
      .card-content h3 { 
        font-size: 0.85rem; 
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      .add-to-cart-btn { font-size: 0.8rem; width: 100%; padding: 8px 2px;}
      .discount-price-area { font-size: 1rem; flex-wrap: wrap; justify-content: center; }
      .original-price { font-size: 0.75rem; }
      
      .flip-card-back h3 { font-size: 1.1rem; }
      
      .admin-card-controls { bottom: -45px; gap: 4px; padding: 0 5px; }
      .admin-card-controls button { padding: 5px; font-size: 0.8rem; }
      
      .top-left-controls { top: 15px; left: 15px; }
      .cart-trigger { top: 15px; right: 15px; width: 40px; height: 40px; }
      .cart-trigger svg { width: 20px; height: 20px; }
      .favorite-badge { font-size: 0.65rem; padding: 4px 6px; left: 5px; top: 10px; }
      .discount-tag { font-size: 0.7rem; padding: 4px 10px; right: -5px; top: 10px; }
    }
  </style>
</head>
<body>

  <!-- Yükleme Animasyonu -->
  <div id="page-loader">
    <div class="spinning-plate">🥗</div>
    <div class="loading-text">LEZZETLER HAZIRLANIYOR...</div>
  </div>

  <div class="top-left-controls">
    <button class="top-btn" onclick="toggleTheme()">Mod</button>
  </div>

  <div class="cart-trigger" onclick="scrollToCart()">
    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
    <div id="cart-badge" class="cart-badge">0</div>
  </div>

  <header>
    <div class="header-title" onclick="checkSecretAdmin()">🍰 GÜLER MUTFAK LEZZETLERİ</div>
    <div id="campaign-text" onclick="editCampaignText()">YÜKLENİYOR...</div>
  </header>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="search-bar" placeholder="Hangi lezzeti arıyorsunuz?..." oninput="renderProducts()">
    </div>
    <div class="category-tabs">
      <button class="tab-btn active" onclick="setCategory('all', this)">Hepsi</button>
      <button class="tab-btn" onclick="setCategory('tatli', this)">Tatlılar</button>
      <button class="tab-btn" onclick="setCategory('tuzlu', this)">Tuzlular</button>
      <button class="tab-btn" onclick="setCategory('yemek', this)">Yemekler</button>
    </div>
  </div>

  <div id="favorites-container" style="display:none;">
    <h2 class="section-title fav-title">⭐ En Çok Sevilenler</h2>
    <button class="fav-nav-btn fav-prev" onclick="scrollFav(-1)">&#10094;</button>
    <section id="favorites-section"></section>
    <button class="fav-nav-btn fav-next" onclick="scrollFav(1)">&#10095;</button>
  </div>

  <h2 class="section-title" id="main-list-title">🍴 Menümüz</h2>
  <section id="products"></section>

  <section id="cart">
    <h2>🛒 Sepetiniz</h2>
    <ul id="cart-items" style="list-style:none; padding:0; margin-top:1.5rem;"></ul>
    <p id="total-price">Toplam: 0₺</p>
    <div class="btn-container">
      <button class="action-btn" onclick="copyCart()">Sepeti Kopyala</button>
      <button class="action-btn order-btn" onclick="placeOrderWA()">WhatsApp'tan Sipariş Ver</button>
      <button class="action-btn insta-btn" onclick="placeOrderInsta()">Instagram'dan Sipariş Ver</button>
    </div>
  </section>

  <section id="contact" style="text-align:center; padding: 2rem 0 4rem;">
    <p style="font-weight:bold; color: #888; font-size: 1.1rem;">📍 Mersin / Mezitli</p>
  </section>

  <!-- Ürün Ekle/Düzenle Modalı -->
  <div id="admin-modal">
    <div class="admin-content">
      <h2 id="admin-modal-title">Ürün Ekle/Düzenle</h2>
      <div class="admin-form-group">
        <label>Lezzet Adı:</label>
        <input type="text" id="admin-name" placeholder="Örn: Ev Yapımı Sarma">
      </div>
      <div class="admin-form-group" style="flex-direction:row; align-items:center; gap:10px;">
        <input type="checkbox" id="admin-is-favorite" style="width:22px; height:22px;">
        <label for="admin-is-favorite">⭐ En Çok Sevilenler'e Ekle</label>
      </div>
      <div class="admin-form-group">
        <label>Kategori:</label>
        <select id="admin-category">
          <option value="yemek">Yemek</option>
          <option value="tatli">Tatlı</option>
          <option value="tuzlu">Tuzlu</option>
        </select>
      </div>
      <div class="admin-form-group">
        <label>Birim (Örn: 1 kg, Tepsi, Adet):</label>
        <input type="text" id="admin-unit" placeholder="1 kg">
      </div>
      <div class="admin-form-group">
        <label>Eski Fiyat (₺):</label>
        <input type="number" id="admin-old-price" placeholder="Örn: 500">
      </div>
      <div class="admin-form-group">
        <label>İndirimli Fiyat (Yoksa boş bırak):</label>
        <input type="number" id="admin-new-price" placeholder="Örn: 450">
      </div>
      <div class="admin-form-group">
        <label>Açıklama (Kart arkasında görünür):</label>

    function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.7) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
        };
      });
    }

      let images = Array.isArray(product.image) ? product.image : [product.image];

      let carouselHtml = `<div class="carousel" id="${carouselId}">`;
      
      images.forEach((img, i) => { 
        carouselHtml += `<img src="${img}" class="${i===0?'active':''}" onerror="this.onerror=null;this.src='${fallbackImg}'">`; 
      });
      
      if(images.length > 1) {
        carouselHtml += `<button class="carousel-btn left" onclick="cS(event, '${carouselId}', -1)">&#10094;</button><button class="carousel-btn right" onclick="cS(event, '${carouselId}', 1)">&#10095;</button>`;
        carouselHtml += `<div class="carousel-dots">`;
        images.forEach((_, i) => {
          carouselHtml += `<span class="dot ${i===0?'active':''}"></span>`;
        });
        carouselHtml += `</div>`;

    function startHover(el, carouselId) {
      if(!cardTimers[carouselId]) {
        el.classList.add('is-hovered');
        cardTimers[carouselId] = setInterval(() => { 
          cS(null, carouselId, 1); 
        }, 1200);
      }
    }

    function stopHover(el, carouselId) {
      if(cardTimers[carouselId]) {
        el.classList.remove('is-hovered');
        clearInterval(cardTimers[carouselId]);
        cardTimers[carouselId] = null;
      }
    }

    document.addEventListener('touchstart', function(e) {
      if (!e.target.closest('.flip-card')) {
        document.querySelectorAll('.flip-card.is-hovered').forEach(card => {
          card.classList.remove('is-hovered');
        });
        for (let id in cardTimers) {
          clearInterval(cardTimers[id]);
          cardTimers[id] = null;
        }
      }
    });

    let wasSwiped = false;
    function tS(e) { touchStartX = e.changedTouches[0].screenX; wasSwiped = false; }
    function tE(e, idString) { 
      let x = e.changedTouches[0].screenX; 
      if (Math.abs(touchStartX - x) > 40) { wasSwiped = true; cS(null, idString, touchStartX > x ? 1 : -1); }
    }
    function cClick(e) { if(wasSwiped) { e.stopPropagation(); wasSwiped = false; } }
    
    function cS(e, idString, dir) {
      if(e) e.stopPropagation();
      const carousel = document.getElementById(idString);
      if(!carousel) return;
      const imgs = carousel.querySelectorAll('img');
      const dots = carousel.querySelectorAll('.dot');
      if(imgs.length <= 1) return;
      
      let cur = Array.from(imgs).findIndex(i => i.classList.contains('active'));
      if(cur === -1) cur = 0;
      
      imgs[cur].classList.remove('active');
      if(dots.length) dots[cur].classList.remove('active');
      
      let nextIdx = (cur + dir + imgs.length) % imgs.length;
      
      imgs[nextIdx].classList.add('active');
      if(dots.length) dots[nextIdx].classList.add('active');
    }
    
    function flip(el, e) { 
      if (e.target.tagName !== 'BUTTON') {
        document.querySelectorAll('.active-card').forEach(c => { if(c!==el) { c.classList.remove('active-card'); c.querySelector('.flip-card-inner').classList.remove('flipped'); } });
        el.classList.toggle('active-card');
        el.querySelector('.flip-card-inner').classList.toggle('flipped'); 
      }
    }

        renderProducts(); await saveToFirebase();

        const temp = productList[index];
        productList[index] = productList[index + 1];

      }
    }

    async function deleteImageFromFirebase(imageUrl) {
      if (!imageUrl || typeof imageUrl !== 'string' || !imageUrl.includes('firebasestorage')) return; 
      try {
        if(typeof firebase.storage === "function") {
           const fileRef = firebase.storage().refFromURL(imageUrl);
           await fileRef.delete();

      } catch (e) { 
        console.error("Silme hatası:", e);

    async function saveProduct() {
      const name = document.getElementById('admin-name').value;
      const price = document.getElementById('admin-old-price').value;
      if(!name || !price) return alert("Lütfen ad ve fiyat girin!");
      
      const pData = {
        name: name.toUpperCase(), category: document.getElementById('admin-category').value,
        unit: document.getElementById('admin-unit').value || "Adet",
        price: parseFloat(price) || 0,
        discount: parseFloat(document.getElementById('admin-new-price').value) || null,
        desc: document.getElementById('admin-desc').value, isFavorite: document.getElementById('admin-is-favorite').checked, image: []
      };
      
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('loader-msg').textContent = "Sistem kaydediliyor...";

      if (editIndex > -1) {
        let oldImage = productList[editIndex].image;
        let oldImages = oldImage ? (Array.isArray(oldImage) ? oldImage : [oldImage]) : [];
        for (let oldImg of oldImages) {
          if (oldImg && !currentEditImages.includes(oldImg)) {
            await deleteImageFromFirebase(oldImg);
          }
        }
      }

      if(currentEditImages.length === 0) {
        pData.image = [fallbackImg];
      } else {
        // Fotoğrafları artık harici bir sunucu yerine, Base64 (sıkıştırılmış metin) olarak doğrudan veritabanına ekliyoruz.
        pData.image = [...currentEditImages];
      }
      
      if (editIndex > -1) productList[editIndex] = pData; else productList.unshift(pData);
      closeAdmin(); await saveToFirebase();
    }

    async function saveToFirebase() {
      document.getElementById('loader-msg').textContent = "Menü kaydediliyor...";

        await db.ref('settings/menu').set({
          products: productList,
          campaignText: campaignText
        });
        document.getElementById('loader').style.display = 'none';
        renderProducts(); 
        showNotif("Başarıyla kaydedildi!");
      } catch(e) {
        console.error(e);
        document.getElementById('loader').style.display = 'none';
        
        if (e.message && (e.message.includes('permission_denied') || e.code === 'PERMISSION_DENIED')) {
          alert("Kayıt Başarısız! Lütfen Firebase panelinden 'Realtime Database -> Rules' kısmına girip '.read': true ve '.write': true yapıp 'Publish' butonuna basın.");
        } else {
          alert("Kaydetme hatası! İnternet bağlantınızı kontrol edin.");
        }
      }
    }

    document.getElementById('admin-image').addEventListener('change', async (e) => {
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('loader-msg').textContent = "Fotoğraflar sıkıştırılıyor...";
      
      for (let f of e.target.files) {
        const compressedBase64 = await compressImage(f, 800, 800, 0.7);
        currentEditImages.push(compressedBase64);
      }
      
      renderPreviews();
      document.getElementById('loader').style.display = 'none';
    });

    function renderPreviews() {
      const div = document.getElementById('admin-image-preview'); div.innerHTML = '';
      currentEditImages.forEach((img, i) => { div.innerHTML += `<div class="image-preview-item"><img src="${img}"><button type="button" onclick="currentEditImages.splice(${i},1);renderPreviews()">X</button></div>`; });
    }

    async function delProd(e, idx) { 
      e.stopPropagation(); 
      if(confirm("Bu lezzeti tamamen silmek istediğinize emin misiniz?")) { 
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader-msg').textContent = "Sistem temizleniyor...";
        let p = productList[idx];
        let imgs = p.image ? (Array.isArray(p.image) ? p.image : [p.image]) : [];
        for (let img of imgs) { if(img) await deleteImageFromFirebase(img); } 
        productList.splice(idx, 1); 
        await saveToFirebase(); 
      } 
    }
    
    async function editCampaignText() { if(!isAdmin) return; const t = prompt("Yeni Kampanya Yazısı:", campaignText); if(t) { campaignText = t; await saveToFirebase(); } }
  </script>
