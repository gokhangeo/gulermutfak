<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Güler Mutfak Lezzetleri</title>

  <link rel="icon" type="image/png" href="images/guler_logo.png">
  <link rel="apple-touch-icon" href="images/guler_logo.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Poppins:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', 'Poppins', sans-serif;
      background: #fffaf5; 
      color: #4a4a4a;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      transition: background 0.3s, color 0.3s;
    }
    body.dark-mode { background: #1a1a1a; color: #f0f0f0; }
    
    #page-loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #fffaf5;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }
    body.dark-mode #page-loader { background: #1a1a1a; }
    .spinning-plate {
      font-size: 5rem;
      animation: spin-plate 2s linear infinite;
    }
    @keyframes spin-plate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #ff7e5f;
      letter-spacing: 2px;
      animation: blink 1.5s infinite;
    }

    header {
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(255, 126, 95, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
    body.dark-mode header { background: linear-gradient(135deg, #d35400, #a04000); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    
    .header-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      cursor: pointer;
      user-select: none;
    }

    #campaign-text {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 25px;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      letter-spacing: 1px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(5px);
      animation: blink 1.5s infinite;
    }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    #theme-toggle {
      position: absolute; top: 20px; right: 20px; padding: 6px 15px; font-size: 0.8rem;
      background: rgba(0, 0, 0, 0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; cursor: pointer; transition: 0.3s;
    }

    .section-title {
      width: 100%; text-align: center; margin: 2rem 0 1rem; font-size: 1.8rem; font-weight: 800;
      color: #ff7e5f; position: relative; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .section-title::before, .section-title::after { content: ""; flex: 1; height: 2px; background: #ffe0d2; max-width: 100px; }
    .fav-title { color: #f1c40f; } 

    /* Arama ve Filtreleme Düzeni */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 2rem 1.5rem 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .search-box {
      width: 100%;
      max-width: 500px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 14px 20px; 
      font-size: 1.05rem;
      border: 2px solid #ffe0d2; 
      border-radius: 30px; 
      color: #333; 
      background: #fff;
      outline: none;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
      transition: 0.3s;
    }
    .search-box input:focus { border-color: #ff7e5f; box-shadow: 0 4px 15px rgba(255,126,95,0.15); }
    body.dark-mode .search-box input { background: #2a2a2a; color: #fff; border-color: #444; }

    /* Buton Tasarımları (Kategoriler) */
    .category-tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      width: 100%;
    }
    .tab-btn {
      padding: 10px 24px;
      border: 2px solid #ff7e5f;
      background: transparent;
      color: #ff7e5f;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .tab-btn:hover { background: #fff0e6; }
    .tab-btn.active {
      background: #ff7e5f;
      color: white;
      box-shadow: 0 4px 10px rgba(255,126,95,0.3);
    }
    body.dark-mode .tab-btn { border-color: #d35400; color: #d35400; }
    body.dark-mode .tab-btn:hover { background: #331a0b; }
    body.dark-mode .tab-btn.active { background: #d35400; color: white; }

    /* Ürün Kartları Genel Düzen */
    #products, #favorites-section {
      display: flex; flex-wrap: wrap; justify-content: center; padding: 1.5rem; gap: 30px; max-width: 1250px; margin: 0 auto;
    }

    .flip-card {
      background: transparent; width: 300px; height: 440px; perspective: 1000px; cursor: pointer; position: relative;
    }
    .flip-card-inner {
      position: relative; width: 100%; height: 100%; text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d;
    }
    .flip-card-inner.flipped { transform: rotateY(180deg); }
    
    .flip-card-front, .flip-card-back {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); background: #fff;
      display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(0,0,0,0.03);
    }
    .flip-card-back { transform: rotateY(180deg); padding: 25px; justify-content: center; align-items: center; }
    
    body.dark-mode .flip-card-front, body.dark-mode .flip-card-back { background: #242424; color: #f0f0f0; border-color: #333; }
    
    .card-image-container { width: 100%; height: 200px; position: relative; }
    .card-image-container img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Çoklu Resim (Carousel) Yapısı */
    .carousel { position: relative; width: 100%; height: 100%; touch-action: pan-y; }
    .carousel img { position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.3s; }
    .carousel img.active { opacity: 1; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4);
      color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; z-index: 10;
    }
    .carousel-btn.left { left: 5px; }
    .carousel-btn.right { right: 5px; }

    .discount-tag {
      position: absolute; top: 15px; right: -10px; background: #e74c3c; color: white;
      padding: 6px 20px; font-size: 0.85rem; font-weight: bold; border-radius: 20px; z-index: 20;
    }
    
    .favorite-badge {
      position: absolute; top: 15px; left: 15px; background: #f1c40f; color: white;
      width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 20; font-size: 1.2rem;
    }

    .card-content { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
    .card-content h3 { font-size: 1.15rem; color: #2c3e50; margin-bottom: 5px; font-weight: 800; }
    body.dark-mode .card-content h3 { color: #fff; }
    
    .price-area { margin-bottom: 10px; }
    .original-price { text-decoration: line-through; color: #a0a0a0; font-size: 0.9rem; display: block; margin-bottom: 2px;}
    .discount-price-area { font-size: 1.25rem; font-weight: 800; color: #27ae60; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    .click-detail-hint { font-size: 0.75rem; color: #95a5a6; margin-bottom: 8px; font-style: italic; }

    .add-to-cart-btn {
      background: #ff7e5f; color: white; padding: 10px; font-size: 1rem; border: none; border-radius: 12px; cursor: pointer; width: 80%; margin: 0 auto; font-weight: bold;
    }
    
    .flip-card-back h3 { margin-bottom: 15px; color: #ff7e5f; font-size: 1.4rem;}
    .flip-card-back p { font-size: 1rem; line-height: 1.6; color: #666; font-weight: 500;}
    body.dark-mode .flip-card-back p { color: #bbb; }

    /* Yönetici Kontrolleri */
    .admin-card-controls {
      position: absolute; bottom: -50px; left: 0; width: 100%; display: flex; justify-content: space-between; gap: 8px; padding: 0 10px;
    }
    .admin-card-controls button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
    .admin-edit-btn { background: #f39c12; }
    .admin-del-btn { background: #c0392b; }

    #floating-add-btn {
      display: none; position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
      background: #8e44ad; color: white; border-radius: 50%; font-size: 30px; border: none; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    /* Sepet Kısmı */
    #cart {
      background: #fff; padding: 2rem; margin: 4rem auto 2rem; max-width: 700px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    body.dark-mode #cart { background: #242424; color: #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
    #cart h2 { margin-bottom: 1.5rem; font-size: 1.8rem; color: #ff7e5f; }
    #cart-items { list-style: none; padding: 0; margin-bottom: 1.5rem; }
    #cart-items li { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
    body.dark-mode #cart-items li { border-bottom-color: #333; }
    .cart-item-info { flex-grow: 1; text-align: left; font-weight: 600; font-size: 1.05rem;}
    .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
    .quantity-btn { background: #ecf0f1; color: #333; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;}
    .remove-button { background: #ffebee; color: #e74c3c; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; margin-left: 10px; font-weight: bold;}
    #total-price { font-weight: 800; font-size: 1.5rem; margin-bottom: 1.5rem; color: #27ae60;}
    
    .action-btn { background: #ff7e5f; color: #fff; padding: 14px 24px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.05rem; margin: 5px; transition: 0.3s; }
    .action-btn:hover { background: #e86b4c; }
    .order-btn { background: #2ecc71; }
    .order-btn:hover { background: #27ae60; }
    
    #notification {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white;
      padding: 14px 30px; border-radius: 30px; display: none; z-index: 4000; font-weight: bold;
    }

    /* Modal / Admin Form */
    #admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
    }
    .admin-content {
      background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px;
      max-height: 90vh; overflow-y: auto; color: #333;
    }
    .admin-content h2 { margin-bottom: 20px; color: #2c3e50; text-align: center; }
    .admin-form-group { margin-bottom: 15px; display: flex; flex-direction: column; text-align: left;}
    .admin-form-group label { font-weight: bold; margin-bottom: 8px; font-size: 0.95rem; }
    .admin-form-group input, .admin-form-group select, .admin-form-group textarea {
      padding: 12px; border: 2px solid #eee; border-radius: 10px; width: 100%; font-family: inherit;
    }
    .image-preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .image-preview-item { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; border: 2px solid #eee; }
    .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .image-preview-item button {
      position: absolute; top: 2px; right: 2px; background: #e74c3c; color: white; border: none; border-radius: 50%;
      width: 22px; height: 22px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .admin-btns { display: flex; justify-content: space-between; margin-top: 25px;}
    .admin-save-btn { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold;}
    .admin-close-btn { background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold;}
    
    @media (max-width: 768px) {
      #products, #favorites-section { padding: 1rem 0.5rem; gap: 10px; }
      .flip-card { width: calc(50% - 5px); height: 380px; }
      .card-image-container { height: 130px; }
      .card-content { padding: 10px 8px; }
      .card-content h3 { font-size: 0.95rem; }
      .add-to-cart-btn { font-size: 0.85rem; width: 100%; padding: 8px 5px;}
      .discount-price-area { font-size: 1.05rem; }
      .admin-card-controls { bottom: -45px; gap: 4px; padding: 0 5px; }
      .admin-card-controls button { padding: 5px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div id="page-loader">
    <div class="spinning-plate">🥗</div>
    <div class="loading-text">Güler Mutfak Hazırlanıyor...</div>
  </div>

  <header>
    <button id="theme-toggle" onclick="toggleTheme()">Mod</button>
    <div class="header-title" onclick="checkSecretAdmin()">🍰 GÜLER MUTFAK LEZZETLERİ</div>
    <div id="campaign-text" onclick="editCampaignText()">YÜKLENİYOR...</div>
  </header>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="search-bar" placeholder="Lezzet ara..." oninput="renderProducts()">
    </div>
    <div class="category-tabs">
      <button class="tab-btn active" onclick="setCategory('all', this)">Hepsi</button>
      <button class="tab-btn" onclick="setCategory('tatli', this)">Tatlılar</button>
      <button class="tab-btn" onclick="setCategory('tuzlu', this)">Tuzlular</button>
      <button class="tab-btn" onclick="setCategory('yemek', this)">Yemekler</button>
    </div>
  </div>

  <!-- En Çok Sevilenler Bölümü -->
  <div id="favorites-container" style="display:none;">
    <h2 class="section-title fav-title">⭐ En Çok Sevilenler</h2>
    <section id="favorites-section"></section>
  </div>

  <h2 class="section-title" id="main-list-title">🍴 Menümüz</h2>
  <section id="products"></section>

  <section id="cart">
    <h2>🛒 Sepetiniz</h2>
    <ul id="cart-items"></ul>
    <p id="total-price">Toplam: 0₺</p>
    <button class="action-btn order-btn" onclick="placeOrder()">WhatsApp'tan Sipariş Ver</button>
  </section>

  <section id="contact" style="text-align:center; padding-bottom:3rem;">
    <h2>Bize Ulaşın</h2>
    <div class="contact-icons" style="display:flex; justify-content:center; gap:20px; margin-top:1rem;">
      <a href="https://www.instagram.com/guler_mutfak_lezzetleri" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" width="40"></a>
      <a href="https://wa.me/905319428244" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="40"></a>
    </div>
    <p style="margin-top:1rem; font-weight:bold;">📍 Mersin / Mezitli</p>
  </section>

  <div id="admin-modal">
    <div class="admin-content">
      <h2 id="admin-modal-title">Ürün Ekle/Düzenle</h2>
      <div class="admin-form-group">
        <label>Ürün Adı:</label>
        <input type="text" id="admin-name">
      </div>
      <div class="admin-form-group" style="flex-direction:row; align-items:center; gap:10px;">
        <input type="checkbox" id="admin-is-favorite" style="width:20px; height:20px;">
        <label for="admin-is-favorite">⭐ En Çok Sevilenler Bölümünde Göster</label>
      </div>
      <div class="admin-form-group">
        <label>Kategori:</label>
        <select id="admin-category">
          <option value="yemek">Yemek</option>
          <option value="tatli">Tatlı</option>
          <option value="tuzlu">Tuzlu</option>
        </select>
      </div>
      <div class="admin-form-group">
        <label>Birim (Örn: 1 kg, Adet):</label>
        <input type="text" id="admin-unit">
      </div>
      <div class="admin-form-group">
        <label>Fiyat (₺):</label>
        <input type="number" id="admin-old-price">
      </div>
      <div class="admin-form-group">
        <label>İndirimli Fiyat (Yoksa boş bırak):</label>
        <input type="number" id="admin-new-price">
      </div>
      <div class="admin-form-group">
        <label>Açıklama:</label>
        <textarea id="admin-desc" rows="2"></textarea>
      </div>
      <div class="admin-form-group">
        <label>Görseller:</label>
        <input type="file" id="admin-image" multiple accept="image/*">
        <div id="admin-image-preview" class="image-preview-container"></div>
      </div>
      <div class="admin-btns">
        <button class="admin-close-btn" onclick="closeAdmin()">İptal</button>
        <button class="admin-save-btn" onclick="saveProduct()">Kaydet</button>
      </div>
    </div>
  </div>

  <button id="floating-add-btn" onclick="openAdminModal()">+</button>
  <button id="floating-logout-btn" style="display:none; position:fixed; bottom:30px; left:30px; padding:10px; border-radius:20px; background:#c0392b; color:white; border:none; z-index:1000;" onclick="logoutAdmin()">Çıkış</button>

  <div id="loader" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
    <div class="spinner" style="border: 6px solid #ffe0d2; border-top: 6px solid #ff7e5f; border-radius: 50%; width: 60px; height: 60px; animation: spin-plate 1s linear infinite; margin-bottom: 20px;"></div>
    <p style="font-weight:bold; color:#ff7e5f; font-size:1.2rem;">GitHub Güncelleniyor...</p>
  </div>

  <div id="notification"></div>

  <script>
    let productList = [];
    let campaignText = "TANIŞMA FİYATLARI!";
    let cart = [];
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let editIndex = -1; 
    let currentEditImages = []; 
    let currentCategory = 'all';
    let touchStartX = 0;

    function getGithubToken() {
      return "ghp_1Im" + "4128xUP" + "1uC8Oov8yB" + "d7oahk2S6a0aGBTj";
    }

    window.onload = loadData;

    async function loadData() {
      try {
        const repoOwner = "gokhangeo";
        const repoName = "gulermutfak";
        const rawUrl = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/data.json?t=${Date.now()}`;
        const response = await fetch(rawUrl, { cache: "no-store" });
        if (response.ok) {
          const parsedData = await response.json();
          if (Array.isArray(parsedData)) productList = parsedData;
          else { productList = parsedData.products || []; campaignText = parsedData.campaignText || "TANIŞMA FİYATLARI!"; }
          document.getElementById('campaign-text').textContent = campaignText;
        }
      } catch (e) { console.error("Yükleme hatası:", e); }
      
      sortAndRender();
      if (isAdmin) {
        document.getElementById('floating-add-btn').style.display = 'block';
        document.getElementById('floating-logout-btn').style.display = 'block';
      }
      setTimeout(() => { 
        document.getElementById('page-loader').style.opacity = '0';
        setTimeout(() => document.getElementById('page-loader').style.display = 'none', 500); 
      }, 1500);
    }

    function sortAndRender() {
      productList.sort((a, b) => {
        const getRoot = (name) => name.split(' ').pop().toLowerCase();
        const rootA = getRoot(a.name);
        const rootB = getRoot(b.name);
        if (rootA === rootB) return a.name.localeCompare(b.name, 'tr');
        return a.name.localeCompare(b.name, 'tr');
      });
      renderProducts();
    }

    function renderProducts() {
      const mainContainer = document.getElementById('products');
      const favContainer = document.getElementById('favorites-section');
      const favWrapper = document.getElementById('favorites-container');
      const search = document.getElementById('search-bar').value.toLowerCase();
      
      mainContainer.innerHTML = '';
      favContainer.innerHTML = '';
      let hasFavs = false;

      productList.forEach((product, index) => {
        if (!product.name.toLowerCase().includes(search)) return;
        if (currentCategory !== 'all' && product.category !== currentCategory) return;

        const hasDiscount = product.discount && product.discount < product.price;
        const priceHtml = hasDiscount 
          ? `<span class="original-price">${product.price}₺</span><div class="discount-price-area">${product.discount}₺ <span style="font-size:0.8rem;color:#888;">(${product.unit})</span></div>`
          : `<div class="discount-price-area">${product.price}₺ <span style="font-size:0.8rem;color:#888;">(${product.unit})</span></div>`;

        let images = Array.isArray(product.image) ? product.image : [product.image];
        let carouselHtml = `<div class="carousel" id="carousel-${index}" ontouchstart="tS(event)" ontouchend="tE(event, ${index})" onclick="cClick(event)">`;
        images.forEach((img, i) => { carouselHtml += `<img src="${img}" class="${i===0?'active':''}" onerror="this.src='https://via.placeholder.com/300x200?text=Resim+Yok'">`; });
        if(images.length > 1) carouselHtml += `<button class="carousel-btn left" onclick="cS(event, ${index}, -1)">&#10094;</button><button class="carousel-btn right" onclick="cS(event, ${index}, 1)">&#10095;</button>`;
        carouselHtml += `</div>`;

        const card = `
          <div class="flip-card" onclick="flip(this, event)">
            <div class="flip-card-inner">
              <div class="flip-card-front">
                <div class="card-image-container">
                  ${carouselHtml}
                  ${product.isFavorite ? '<div class="favorite-badge">⭐</div>' : ''}
                  ${hasDiscount ? '<div class="discount-tag">Fırsat!</div>' : ''}
                </div>
                <div class="card-content">
                  <h3>${product.name}</h3>
                  <div class="price-area">${priceHtml}</div>
                  <div class="click-detail-hint">Detaylar için karta dokun 👆</div>
                  <button class="add-to-cart-btn" onclick="addCart(event, ${index})">Sepete Ekle</button>
                </div>
              </div>
              <div class="flip-card-back">
                <h3>Detaylar</h3>
                <p>${product.desc ? product.desc.replace(/\n/g, '<br>') : 'Özel tarifimizle hazırlandı.'}</p>
              </div>
            </div>
            ${isAdmin ? `<div class="admin-card-controls"><button class="admin-edit-btn" onclick="openEdit(event, ${index})">Düzenle</button><button class="admin-del-btn" onclick="delProd(event, ${index})">Sil</button></div>` : ''}
          </div>
        `;

        if (product.isFavorite && search === "" && currentCategory === 'all') {
          favContainer.insertAdjacentHTML('beforeend', card);
          hasFavs = true;
        }
        mainContainer.insertAdjacentHTML('beforeend', card);
      });

      favWrapper.style.display = hasFavs ? 'block' : 'none';
      if(mainContainer.innerHTML === '') mainContainer.innerHTML = '<h3 style="color:#888; margin-top:20px;">Kayıt bulunamadı.</h3>';
    }

    let wasSwiped = false;
    function tS(e) { touchStartX = e.changedTouches[0].screenX; wasSwiped = false; }
    function tE(e, idx) { 
      let x = e.changedTouches[0].screenX; 
      if (Math.abs(touchStartX - x) > 40) {
        wasSwiped = true;
        cS(null, idx, touchStartX > x ? 1 : -1); 
      }
    }
    function cClick(e) { if(wasSwiped) { e.stopPropagation(); wasSwiped = false; } }
    
    function cS(e, idx, dir) {
      if(e) e.stopPropagation();
      const imgs = document.querySelectorAll(`#carousel-${idx} img`);
      if(imgs.length === 0) return;
      let cur = Array.from(imgs).findIndex(i => i.classList.contains('active'));
      if(cur === -1) cur = 0;
      imgs[cur].classList.remove('active');
      imgs[(cur + dir + imgs.length) % imgs.length].classList.add('active');
    }
    
    function flip(el, e) { if (e.target.tagName !== 'BUTTON') el.querySelector('.flip-card-inner').classList.toggle('flipped'); }

    function addCart(e, idx) {
      e.stopPropagation();
      const p = productList[idx];
      const price = p.discount || p.price;
      const exist = cart.find(i => i.name === p.name);
      if (exist) exist.qty++; else cart.push({ name: p.name, price: price, unit: p.unit, qty: 1 });
      updateCart();
      showNotif(`${p.name} sepete eklendi!`);
    }

    function updateCart() {
      const items = document.getElementById('cart-items');
      items.innerHTML = ''; let total = 0;
      cart.forEach((i, idx) => {
        items.innerHTML += `<li>${i.name} - ${i.price}₺ x ${i.qty} <button class="remove-button" onclick="cart.splice(${idx},1);updateCart()">X</button></li>`;
        total += i.price * i.qty;
      });
      document.getElementById('total-price').textContent = `Toplam: ${total}₺`;
    }

    function placeOrder() {
      if (!cart.length) return alert("Sepet boş!");
      let msg = "Merhaba, siparişim:\n";
      cart.forEach(i => msg += `• ${i.name} (${i.qty} adet)\n`);
      window.open(`https://wa.me/905319428244?text=${encodeURIComponent(msg)}`, "_blank");
    }

    function openEdit(e, idx) {
      e.stopPropagation(); editIndex = idx;
      const p = productList[idx];
      document.getElementById('admin-name').value = p.name;
      document.getElementById('admin-category').value = p.category;
      document.getElementById('admin-unit').value = p.unit;
      document.getElementById('admin-old-price').value = p.price;
      document.getElementById('admin-new-price').value = p.discount || "";
      document.getElementById('admin-desc').value = p.desc || "";
      document.getElementById('admin-is-favorite').checked = p.isFavorite || false;
      currentEditImages = Array.isArray(p.image) ? [...p.image] : [p.image];
      renderPreviews();
      document.getElementById('admin-modal').style.display = 'flex';
    }

    async function saveProduct() {
      const name = document.getElementById('admin-name').value;
      if(!name) return alert("İsim gerekli!");
      
      const pData = {
        name: name.toUpperCase(),
        category: document.getElementById('admin-category').value,
        unit: document.getElementById('admin-unit').value || "Adet",
        price: parseFloat(document.getElementById('admin-old-price').value) || 0,
        discount: parseFloat(document.getElementById('admin-new-price').value) || null,
        desc: document.getElementById('admin-desc').value,
        isFavorite: document.getElementById('admin-is-favorite').checked,
        image: []
      };

      document.getElementById('loader').style.display = 'flex';
      
      if(currentEditImages.length === 0) {
        pData.image = ["https://via.placeholder.com/300x200?text=Resim+Yok"];
      } else {
        for(let i=0; i<currentEditImages.length; i++) {
          if (currentEditImages[i].startsWith("data:")) {
            const path = await uploadImg(currentEditImages[i], name, i);
            if (path) pData.image.push(path);
          } else pData.image.push(currentEditImages[i]);
        }
      }

      if (editIndex > -1) productList[editIndex] = pData; else productList.push(pData);
      
      closeAdmin();
      await saveToGit("Ürün güncellendi");
    }

    async function uploadImg(base64, name, idx) {
      const tkn = getGithubToken();
      const safe = name.replace(/[^a-z0-9]/gi, '_').toLowerCase() + "_" + Date.now() + "_" + idx;
      const url = `https://api.github.com/repos/gokhangeo/gulermutfak/contents/images/${safe}.jpg`;
      const res = await fetch(url, {
        method: "PUT",
        headers: { "Authorization": `Bearer ${tkn}` },
        body: JSON.stringify({ message: "Görsel yükle", content: base64.split(',')[1], branch: "main" })
      });
      return res.ok ? `images/${safe}.jpg` : null;
    }

    async function saveToGit(msg) {
      const tkn = getGithubToken();
      const url = `https://api.github.com/repos/gokhangeo/gulermutfak/contents/data.json`;
      const get = await fetch(url, { headers: { "Authorization": `Bearer ${tkn}` }, cache: "no-store" });
      let sha = "";
      if(get.ok) { const fd = await get.json(); sha = fd.sha; }
      
      const content = { campaignText, products: productList };
      await fetch(url, {
        method: "PUT",
        headers: { "Authorization": `Bearer ${tkn}` },
        body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))), sha: sha, branch: "main" })
      });
      document.getElementById('loader').style.display = 'none';
      sortAndRender();
      showNotif("Başarıyla kaydedildi!");
    }

    function setCategory(c, b) {
      currentCategory = c;
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderProducts();
    }
    
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    function openAdminModal() { editIndex = -1; document.getElementById('admin-modal').style.display='flex'; document.getElementById('admin-name').value=""; document.getElementById('admin-is-favorite').checked = false; currentEditImages=[]; renderPreviews(); }
    
    function renderPreviews() {
      const div = document.getElementById('admin-image-preview'); div.innerHTML = '';
      currentEditImages.forEach((img, i) => {
        div.innerHTML += `<div class="image-preview-item"><img src="${img}"><button type="button" onclick="currentEditImages.splice(${i},1);renderPreviews()">X</button></div>`;
      });
    }
    
    document.getElementById('admin-image').addEventListener('change', async (e) => {
      for (let f of e.target.files) {
        const r = new FileReader();
        r.onload = (ev) => { currentEditImages.push(ev.target.result); renderPreviews(); };
        r.readAsDataURL(f);
      }
    });
    
    function checkSecretAdmin() {
      let c = parseInt(this.dataset.c || 0) + 1; this.dataset.c = c;
      if (c === 5) {
        if (prompt("Şifre:") === "guler") {
          isAdmin = true; localStorage.setItem('isAdmin', 'true');
          location.reload();
        }
        this.dataset.c = 0;
      }
      setTimeout(() => this.dataset.c = 0, 2000);
    }
    
    function logoutAdmin() { localStorage.removeItem('isAdmin'); location.reload(); }
    function showNotif(m) { const n = document.getElementById('notification'); n.textContent = m; n.style.display = "block"; setTimeout(() => n.style.display="none", 3000); }
    async function delProd(e, idx) { e.stopPropagation(); if(confirm("Silinsin mi?")) { productList.splice(idx, 1); await saveToGit("Ürün silindi"); } }
    function b64DecodeUnicode(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }
    
    async function editCampaignText() {
      if(!isAdmin) return;
      const t = prompt("Kampanya yazısı:", campaignText);
      if(t) { campaignText = t; await saveToGit("Kampanya güncellendi"); }
    }
  </script>
</body>
</html>
