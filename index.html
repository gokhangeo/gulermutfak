<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Güler Mutfak Lezzetleri</title>

  <link rel="icon" type="image/png" href="images/guler_logo.png">
  <link rel="apple-touch-icon" href="images/guler_logo.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Poppins:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', 'Poppins', sans-serif;
      background: #fffaf5; 
      color: #4a4a4a;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      transition: background 0.3s, color 0.3s;
    }
    body.dark-mode { background: #1a1a1a; color: #f0f0f0; }
    
    header {
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(255, 126, 95, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
    body.dark-mode header { background: linear-gradient(135deg, #d35400, #a04000); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    
    .header-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      cursor: pointer;
      user-select: none;
    }

    #campaign-text {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 25px;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      letter-spacing: 1px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(5px);
      animation: blink 1.5s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    #theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 6px 15px;
      font-size: 0.8rem;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    #theme-toggle:hover { background: rgba(0, 0, 0, 0.3); }
    
    .background-icons {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      opacity: 0.15;
      pointer-events: none;
    }
    .background-icons img {
      position: absolute;
      width: 120px;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float { 
      0% { transform: translateY(0px) rotate(0deg); } 
      50% { transform: translateY(-20px) rotate(5deg); } 
      100% { transform: translateY(0px) rotate(0deg); } 
    }
    .icon1 { top: 10%; left: 10%; content: url("images/icon1.png"); }
    .icon2 { top: 20%; left: 80%; content: url("images/icon2.png"); animation-delay: 1s !important; }
    .icon3 { top: 40%; left: 20%; content: url("images/icon3.png"); animation-delay: 2s !important; }
    .icon4 { top: 60%; left: 75%; content: url("images/icon4.png"); animation-delay: 3s !important; }
    .icon5 { top: 80%; left: 15%; content: url("images/icon5.png"); animation-delay: 4s !important; }
    .icon6 { top: 85%; left: 85%; content: url("images/icon6.png"); animation-delay: 5s !important; }
    
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 2rem 1.5rem 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .search-box {
      width: 100%;
      max-width: 500px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 14px 20px; 
      font-size: 1.05rem;
      border: 2px solid #ffe0d2; 
      border-radius: 30px; 
      color: #333; 
      background: #fff;
      outline: none;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
      transition: 0.3s;
    }
    .search-box input:focus { border-color: #ff7e5f; box-shadow: 0 4px 15px rgba(255,126,95,0.15); }
    body.dark-mode .search-box input { background: #2a2a2a; color: #fff; border-color: #444; }

    .category-tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      width: 100%;
    }
    .tab-btn {
      padding: 10px 24px;
      border: 2px solid #ff7e5f;
      background: transparent;
      color: #ff7e5f;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .tab-btn:hover { background: #fff0e6; }
    .tab-btn.active {
      background: #ff7e5f;
      color: white;
      box-shadow: 0 4px 10px rgba(255,126,95,0.3);
    }
    body.dark-mode .tab-btn { border-color: #d35400; color: #d35400; }
    body.dark-mode .tab-btn:hover { background: #331a0b; }
    body.dark-mode .tab-btn.active { background: #d35400; color: white; }

    #products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 1.5rem;
      gap: 30px;
      max-width: 1250px;
      margin: 0 auto;
    }

    .flip-card {
      background: transparent;
      width: 300px; 
      height: 420px;
      perspective: 1000px;
      cursor: pointer;
      position: relative;
    }
    .flip-card-inner {
      position: relative;
      width: 100%; height: 100%;
      text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flip-card-inner.flipped { transform: rotateY(180deg); }
    
    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.03);
    }
    body.dark-mode .flip-card-front, body.dark-mode .flip-card-back {
      background: #242424; color: #f0f0f0; border-color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .card-image-container { width: 100%; height: 200px; position: relative; }
    .card-image-container img { width: 100%; height: 100%; object-fit: cover; }
    
    /* GÖRSEL GALERİSİ (CAROUSEL) İÇİN STİLLER */
    .carousel { position: relative; width: 100%; height: 100%; }
    .carousel img { position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.3s ease-in-out; }
    .carousel img.active { opacity: 1; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.5); color: white; border: none; padding: 5px 10px;
      cursor: pointer; border-radius: 5px; z-index: 10; font-size: 1rem;
    }
    .carousel-btn:hover { background: rgba(0,0,0,0.8); }
    .carousel-btn.left { left: 5px; }
    .carousel-btn.right { right: 5px; }

    .discount-tag {
      position: absolute; top: 15px; right: -10px; background: #e74c3c; color: white;
      padding: 6px 20px; font-size: 0.85rem; font-weight: bold; border-radius: 20px;
      box-shadow: 0 4px 10px rgba(231,76,60,0.3); z-index: 20;
    }
    
    .card-content { padding: 20px 15px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
    .card-content h3 { font-size: 1.2rem; color: #2c3e50; margin-bottom: 5px; font-weight: 800; }
    body.dark-mode .card-content h3 { color: #fff; }
    
    .price-area { margin-bottom: 15px; }
    .original-price { text-decoration: line-through; color: #a0a0a0; font-size: 0.9rem; display: block; margin-bottom: 2px;}
    .discount-price-area { font-size: 1.3rem; font-weight: 800; color: #27ae60; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    .add-to-cart-btn {
      background: #ff7e5f; color: white; padding: 12px; font-size: 1.05rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; width: 80%; margin: 0 auto; transition: 0.3s;
      box-shadow: 0 4px 10px rgba(255,126,95,0.2);
    }
    .add-to-cart-btn:hover { background: #e86b4c; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255,126,95,0.3); }
    
    .flip-card-back { transform: rotateY(180deg); padding: 25px; justify-content: center; align-items: center; }
    .flip-card-back h3 { margin-bottom: 15px; color: #ff7e5f; font-size: 1.4rem;}
    .flip-card-back p { font-size: 1rem; line-height: 1.6; color: #666; font-weight: 500;}
    body.dark-mode .flip-card-back p { color: #bbb; }

    .admin-card-controls {
      position: absolute; bottom: -50px; left: 0; width: 100%;
      display: flex; justify-content: space-between; gap: 8px; padding: 0 10px;
    }
    .admin-card-controls button {
      flex: 1; padding: 8px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white;
    }
    .admin-edit-btn { background: #f39c12; }
    .admin-del-btn { background: #c0392b; }
    .admin-move-btn { background: #34495e; padding: 8px 0; flex: 0.4; font-size: 1.1rem; }
    .admin-move-btn:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.5; }

    #floating-add-btn {
      display: none; position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
      background: #8e44ad; color: white; border-radius: 50%; font-size: 30px; font-weight: bold;
      border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000;
    }
    
    #floating-logout-btn {
      display: none; position: fixed; bottom: 30px; left: 30px; height: 40px; padding: 0 15px;
      background: #c0392b; color: white; border-radius: 20px; font-weight: bold;
      border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000;
    }
    
    #cart {
      background: #fff; padding: 2rem; margin: 4rem auto 2rem; max-width: 700px;
      border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;
    }
    body.dark-mode #cart { background: #242424; color: #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
    #cart h2 { margin-bottom: 1.5rem; font-size: 1.8rem; color: #ff7e5f; }
    #cart-items { list-style: none; padding: 0; margin-bottom: 1.5rem; }
    #cart-items li { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
    body.dark-mode #cart-items li { border-bottom-color: #333; }
    .cart-item-info { flex-grow: 1; text-align: left; font-weight: 600; font-size: 1.05rem;}
    .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
    .quantity-btn { background: #ecf0f1; color: #333; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;}
    .remove-button { background: #ffebee; color: #e74c3c; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; margin-left: 10px; font-weight: bold;}
    #total-price { font-weight: 800; font-size: 1.5rem; margin-bottom: 1.5rem; color: #27ae60;}
    
    .action-btn { background: #ff7e5f; color: #fff; padding: 14px 24px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.05rem; margin: 5px; transition: 0.3s; }
    .action-btn:hover { background: #e86b4c; }
    .order-btn { background: #2ecc71; }
    .order-btn:hover { background: #27ae60; }

    #contact { text-align: center; margin: 3rem auto; padding-bottom: 3rem;}
    #contact h2 { margin-bottom: 1.5rem; font-size: 1.6rem; color: #7f8c8d; }
    .contact-icons { display: flex; justify-content: center; gap: 2rem; }
    .contact-icons img { width: 55px; height: 55px; cursor: pointer; transition: transform 0.3s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));}
    .contact-icons img:hover { transform: scale(1.15); }
    
    footer {
      text-align: center; padding: 2rem 1rem; background: #fff; border-top: 1px solid #eee;
      font-size: 0.95rem; color: #777;
    }
    body.dark-mode footer { background: #1a1a1a; border-color: #333; color: #aaa; }
    
    #admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
      backdrop-filter: blur(5px);
    }
    .admin-content {
      background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px;
      max-height: 90vh; overflow-y: auto; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .admin-content h2 { margin-bottom: 20px; color: #2c3e50; text-align: center; font-weight: 800;}
    .admin-form-group { margin-bottom: 15px; display: flex; flex-direction: column; text-align: left;}
    .admin-form-group label { font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; color: #4a4a4a;}
    .admin-form-group input, .admin-form-group select, .admin-form-group textarea {
      padding: 12px; border: 2px solid #eee; border-radius: 10px; width: 100%; font-family: inherit; font-size: 1rem;
    }
    .admin-form-group input:focus, .admin-form-group select:focus, .admin-form-group textarea:focus { border-color: #ff7e5f; outline: none;}
    .admin-btns { display: flex; justify-content: space-between; margin-top: 25px;}
    .admin-save-btn { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem;}
    .admin-close-btn { background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem;}
    
    #loader {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); z-index: 3000; justify-content: center; align-items: center;
      flex-direction: column; font-weight: 800; color: #ff7e5f; font-size: 1.3rem; text-align: center; padding: 20px;
    }
    .spinner { border: 6px solid #ffe0d2; border-top: 6px solid #ff7e5f; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #notification {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white;
      padding: 14px 30px; border-radius: 30px; display: none; z-index: 4000; font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    
    @media (max-width: 768px) {
      .flip-card { width: 100%; max-width: 320px; margin-bottom: 25px; }
      .header-title { font-size: 1.6rem; }
      #theme-toggle { top: 15px; right: 15px; }
      .category-tabs { gap: 8px; }
      .tab-btn { padding: 8px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <button id="theme-toggle" onclick="toggleTheme()">Karanlık Mod</button>
    <div class="header-title" onclick="checkSecretAdmin()">🍰 GÜLER MUTFAK LEZZETLERİ</div>
    <div id="campaign-text" onclick="editCampaignText()" title="Yöneticiyseniz değiştirmek için tıklayın">TANIŞMA FİYATLARI!</div>
  </header>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="search-bar" placeholder="Hangi lezzeti arıyorsunuz?..." oninput="renderProducts()">
    </div>
    <div class="category-tabs">
      <button class="tab-btn active" onclick="setCategory('all', this)">Tüm Ürünler</button>
      <button class="tab-btn" onclick="setCategory('tatli', this)">Tatlılar</button>
      <button class="tab-btn" onclick="setCategory('tuzlu', this)">Tuzlular</button>
      <button class="tab-btn" onclick="setCategory('yemek', this)">Yemekler</button>
    </div>
  </div>

  <section id="products"></section>

  <section id="cart">
    <h2>🛒 Sepetiniz</h2>
    <ul id="cart-items"></ul>
    <p id="total-price">Toplam: 0₺</p>
    <button class="action-btn" onclick="copyCart()">Sepeti Kopyala</button>
    <button class="action-btn order-btn" onclick="placeOrder()">WhatsApp'tan Sipariş Ver</button>
  </section>

  <section id="contact">
    <h2>Bize Ulaşın</h2>
    <div class="contact-icons">
      <a href="https://www.instagram.com/guler_mutfak_lezzetleri?igsh=MTI1Nzdpa254enhtZA==" target="_blank">
        <img src="images/instagram_logo.png" alt="Instagram" onerror="this.src='https://cdn-icons-png.flaticon.com/512/174/174855.png'">
      </a>
      <a href="https://wa.me/905319428244" target="_blank">
        <img src="images/whatsapp_logo.png" alt="WhatsApp" onerror="this.src='https://cdn-icons-png.flaticon.com/512/733/733585.png'">
      </a>
    </div>
  </section>

  <div id="admin-modal">
    <div class="admin-content">
      <h2 id="admin-modal-title">Ürün Ekle</h2>
      <div class="admin-form-group">
        <label>Ürün Adı:</label>
        <input type="text" id="admin-name" placeholder="Örn: Ev Yapımı Kısır">
      </div>
      <div class="admin-form-group">
        <label>Kategori:</label>
        <select id="admin-category">
          <option value="yemek">Yemek</option>
          <option value="tatli">Tatlı</option>
          <option value="tuzlu">Tuzlu</option>
        </select>
      </div>
      <div class="admin-form-group">
        <label>Birim (Örn: 1 kg, 1 tepsi, Adet):</label>
        <input type="text" id="admin-unit" placeholder="1 kg">
      </div>
      <div class="admin-form-group">
        <label>Eski Fiyat (₺):</label>
        <input type="number" id="admin-old-price" placeholder="Örn: 300">
      </div>
      <div class="admin-form-group">
        <label>İndirimli Fiyat (₺) (Opsiyonel):</label>
        <input type="number" id="admin-new-price" placeholder="Örn: 250 (Yoksa boş bırak)">
      </div>
      <div class="admin-form-group">
        <label>Açıklama (Kart arkası için):</label>
        <textarea id="admin-desc" rows="3" placeholder="Bu ürünün enfes hikayesi..."></textarea>
      </div>
      <div class="admin-form-group">
        <label>Ürün Görsel(ler)i Yükle (Birden fazla seçebilirsiniz):</label>
        <input type="file" id="admin-image" accept="image/*" multiple>
        <small style="color: #e74c3c; margin-top:5px;">Ctrl veya Shift'e basılı tutarak birden fazla resim seçebilirsiniz.</small>
      </div>
      <div class="admin-btns">
        <button class="admin-close-btn" onclick="closeAdmin()">İptal Et</button>
        <button class="admin-save-btn" onclick="saveProduct()">Kaydet ve Yayına Al</button>
      </div>
    </div>
  </div>

  <button id="floating-add-btn" onclick="openAdminModal()">+</button>
  <button id="floating-logout-btn" onclick="logoutAdmin()">Admin Çıkış</button>

  <div id="loader">
    <div class="spinner"></div>
    <span id="loader-text">İşlem yapılıyor. Veriler güncelleniyor, lütfen bekleyin...</span>
  </div>

  <div id="notification"></div>

  <script>
    let productList = [];
    let campaignText = "TANIŞMA FİYATLARI!";
    let cart = [];
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let clickCount = 0;
    let editIndex = -1; 
    let tempBase64Images = []; // Birden fazla görseli tutacak dizi
    let currentCategory = 'all'; 

    function getGithubToken() {
      return "ghp_1Im" + "4128xUP" + "1uC8Oov8yB" + "d7oahk2S6a0aGBTj";
    }
    
    window.onload = function() { 
      if (isAdmin) {
        document.getElementById('floating-add-btn').style.display = 'block';
        document.getElementById('floating-logout-btn').style.display = 'block';
      }
      loadData(); 
    };

    // GitHub üzerinden anlık olarak veri çekme
    async function loadData() {
      try {
        const repoOwner = "gokhangeo";
        const repoName = "guler-mutfak-lezzetleri";
        const filePath = "data.json";
        const rawUrl = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/${filePath}?t=${Date.now()}`;
        
        const response = await fetch(rawUrl, { cache: "no-store" });
        
        if (response.ok) {
          const parsedData = await response.json();
          if (Array.isArray(parsedData)) {
            productList = parsedData;
          } else {
            productList = parsedData.products || [];
            campaignText = parsedData.campaignText || "TANIŞMA FİYATLARI!";
          }
          document.getElementById('campaign-text').textContent = campaignText;
        } else {
          console.error("Veri dosyası bulunamadı.");
        }
      } catch (error) {
        console.error("Veri çekme hatası:", error);
      }
      renderProducts();
    }

    function setCategory(cat, btnElement) {
      currentCategory = cat;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      renderProducts();
    }

    function editCampaignText() {
      if (!isAdmin) return; 
      const newText = prompt("Yeni Kampanya Yazısını Girin:", campaignText);
      if (newText !== null && newText.trim() !== "") {
        campaignText = newText.trim();
        document.getElementById('campaign-text').textContent = campaignText;
        saveToGitHub("Kampanya yazısı güncellendi");
      }
    }
    
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      document.getElementById('theme-toggle').textContent = document.body.classList.contains('dark-mode') ? 'Aydınlık Mod' : 'Karanlık Mod';
    }

    function checkSecretAdmin() {
      if(isAdmin) return; 
      clickCount++;
      if (clickCount === 5) {
        const pw = prompt("Yönetici Şifresi:");
        if (pw === "guler") {
          isAdmin = true;
          localStorage.setItem('isAdmin', 'true'); 
          alert("Yönetici Modu Aktif Edildi!");
          document.getElementById('floating-add-btn').style.display = 'block';
          document.getElementById('floating-logout-btn').style.display = 'block';
          renderProducts(); 
        } else if(pw) {
          alert("Hatalı Şifre!");
        }
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 2000); 
    }

    function logoutAdmin() {
      isAdmin = false;
      localStorage.removeItem('isAdmin');
      document.getElementById('floating-add-btn').style.display = 'none';
      document.getElementById('floating-logout-btn').style.display = 'none';
      renderProducts();
      showNotification("Yönetici modundan çıkıldı.");
    }
    
    function renderProducts() {
      const container = document.getElementById('products');
      const searchText = document.getElementById('search-bar').value.toLowerCase();
      
      container.innerHTML = '';
      
      productList.forEach((product, index) => {
        const matchesSearch = product.name.toLowerCase().includes(searchText);
        const matchesCat = currentCategory === 'all' || product.category === currentCategory;
        
        if(matchesSearch && matchesCat) {
          const hasDiscount = product.discount && product.discount < product.price;
          const activePrice = hasDiscount ? product.discount : product.price;
          
          let priceHtml = hasDiscount 
            ? `<span class="original-price">${product.price}₺ (${product.unit})</span>
               <div class="discount-price-area"> ${product.discount}₺ <span style="font-size:0.9rem; font-weight:normal; color:#888;">(${product.unit})</span></div>`
            : `<div class="discount-price-area" style="color:#555;">${product.price}₺ <span style="font-size:0.9rem; font-weight:normal;">(${product.unit})</span></div>`;

          let discountBadge = hasDiscount ? `<div class="discount-tag">Fırsat!</div>` : '';

          // Görselleri işle (Eski veriler tek bir string olabilir, onu da dizi gibi davranalım)
          let imagesArray = Array.isArray(product.image) ? product.image : [product.image];
          let imageHTML = '';

          if (imagesArray.length > 1) {
            // Birden fazla görsel varsa kaydırmalı (carousel) yapısı ekle
            imageHTML += `<div class="carousel" id="carousel-${index}">`;
            imagesArray.forEach((img, i) => {
              imageHTML += `<img src="${img}" class="${i === 0 ? 'active' : ''}" onerror="this.src='https://via.placeholder.com/300x200?text=Gorsel+Yok'">`;
            });
            imageHTML += `
              <button class="carousel-btn left" onclick="changeSlide(event, ${index}, -1)">&#10094;</button>
              <button class="carousel-btn right" onclick="changeSlide(event, ${index}, 1)">&#10095;</button>
            </div>`;
          } else {
            // Tek görsel varsa normal göster
            imageHTML = `<img src="${imagesArray[0] || 'https://via.placeholder.com/300x200?text=Gorsel+Yok'}" onerror="this.src='https://via.placeholder.com/300x200?text=Gorsel+Yok'">`;
          }

          let adminControlsHtml = '';
          if (isAdmin) {
            adminControlsHtml = `
              <div class="admin-card-controls">
                <button class="admin-move-btn" title="Yukarı Taşı" onclick="moveProductLocal(event, ${index}, -1)" ${index === 0 ? 'disabled' : ''}>↑</button>
                <button class="admin-move-btn" title="Aşağı Taşı" onclick="moveProductLocal(event, ${index}, 1)" ${index === productList.length - 1 ? 'disabled' : ''}>↓</button>
                <button class="admin-edit-btn" onclick="openEditModal(event, ${index})">Düzenle</button>
                <button class="admin-del-btn" onclick="deleteProductLocal(event, ${index})">Sil</button>
              </div>
            `;
          }

          const cardHtml = `
            <div class="flip-card" onclick="flipCard(this, event)">
              <div class="flip-card-inner">
                <div class="flip-card-front">
                  <div class="card-image-container">
                    ${imageHTML}
                    ${discountBadge}
                  </div>
                  <div class="card-content">
                    <h3>${product.name}</h3>
                    <div class="price-area">${priceHtml}</div>
                    <button class="add-to-cart-btn" onclick="addToCart(event, ${index}, ${activePrice})">Sepete Ekle</button>
                  </div>
                </div>
                <div class="flip-card-back">
                  <h3>Detaylar</h3>
                  <p>${product.desc.replace(/\n/g, '<br>')}</p>
                </div>
              </div>
              ${adminControlsHtml}
            </div>
          `;
          container.insertAdjacentHTML('beforeend', cardHtml);
        }
      });

      if(container.innerHTML === '') {
        container.innerHTML = '<h3 style="color:#888; margin-top:20px;">Bu kategoride ürün bulunamadı.</h3>';
      }
    }

    function flipCard(element, e) {
      if (e.target.tagName.toLowerCase() !== 'button') {
        element.querySelector('.flip-card-inner').classList.toggle('flipped');
      }
    }

    // Görsel Kaydırma Mantığı
    function changeSlide(e, cardIndex, direction) {
      e.stopPropagation(); // Kartın dönmesini engeller
      const carousel = document.getElementById(`carousel-${cardIndex}`);
      const images = carousel.querySelectorAll('img');
      let activeIndex = Array.from(images).findIndex(img => img.classList.contains('active'));
      
      images[activeIndex].classList.remove('active');
      activeIndex = (activeIndex + direction + images.length) % images.length;
      images[activeIndex].classList.add('active');
    }

    function addToCart(e, index, price) {
      e.stopPropagation();
      const product = productList[index];
      const existing = cart.find(item => item.name === product.name);
      if (existing) { existing.quantity++; }
      else { cart.push({ name: product.name, price: price, unit: product.unit, quantity: 1 }); }
      updateCart();
      showNotification(`${product.name} sepete eklendi!`);
    }

    function updateCart() {
      const cartItems = document.getElementById('cart-items');
      cartItems.innerHTML = '';
      let total = 0;
      cart.forEach((item, idx) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <div class="cart-item-info">${item.name} - ${item.price}₺</div>
          <div class="cart-item-quantity">
            <button class="quantity-btn" onclick="cart[${idx}].quantity > 1 ? (cart[${idx}].quantity--, updateCart()) : removeFromCart(${idx})">-</button>
            <span>${item.quantity}</span>
            <button class="quantity-btn" onclick="cart[${idx}].quantity++, updateCart()">+</button>
            <button class="remove-button" onclick="removeFromCart(${idx})">Sil</button>
          </div>
        `;
        cartItems.appendChild(li);
        total += item.price * item.quantity;
      });
      document.getElementById('total-price').textContent = `Toplam: ${total}₺`;
    }

    function removeFromCart(index) {
      if(confirm(`${cart[index].name} sepetten çıkarılsın mı?`)){ cart.splice(index, 1); updateCart(); }
    }

    function copyCart() {
      if(cart.length===0) return showNotification("Sepetiniz boş!");
      let text = "Merhaba, siparişim:\n\n";
      cart.forEach(i => text += `▪ ${i.name} - ${i.price}₺ x ${i.quantity} (${i.unit})\n`);
      navigator.clipboard.writeText(text).then(() => showNotification("Sipariş Kopyalandı! İşleme devam edebilirsiniz.")).catch(()=>alert("Kopyalanamadı."));
    }

    function placeOrder() {
      if(cart.length===0) return showNotification("Sepetiniz boş!");
      let text = "Merhaba, Güler Mutfak Lezzetleri! Siparişim:\n\n";
      cart.forEach(i => text += `▪ ${i.name} - ${i.price}₺ x ${i.quantity} (${i.unit})\n`);
      const encoded = encodeURIComponent(text);
      window.open(`https://wa.me/905319428244?text=${encoded}`, "_blank");
    }

    function showNotification(msg) {
      const notif = document.getElementById('notification');
      notif.textContent = msg; notif.style.display = "block";
      setTimeout(() => notif.style.display = "none", 3000);
    }
    
    function openAdminModal() {
      editIndex = -1; 
      document.getElementById('admin-modal-title').textContent = "Yeni Lezzet Ekle";
      resetAdminForm();
      document.getElementById('admin-modal').style.display = 'flex';
    }

    function openEditModal(e, index) {
      e.stopPropagation();
      editIndex = index;
      const p = productList[index];
      
      document.getElementById('admin-modal-title').textContent = "Lezzeti Düzenle";
      document.getElementById('admin-name').value = p.name;
      document.getElementById('admin-category').value = p.category;
      document.getElementById('admin-unit').value = p.unit;
      document.getElementById('admin-old-price').value = p.price;
      document.getElementById('admin-new-price').value = p.discount || "";
      document.getElementById('admin-desc').value = p.desc;
      tempBase64Images = []; 
      
      document.getElementById('admin-modal').style.display = 'flex';
    }

    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; resetAdminForm(); }
    
    function resetAdminForm() {
      tempBase64Images = [];
      document.getElementById('admin-name').value = "";
      document.getElementById('admin-old-price').value = "";
      document.getElementById('admin-new-price').value = "";
      document.getElementById('admin-desc').value = "";
      document.getElementById('admin-unit').value = "";
      document.getElementById('admin-image').value = "";
    }

    // Birden fazla görseli yakala
    document.getElementById('admin-image').addEventListener('change', async function(e) {
      tempBase64Images = [];
      const files = e.target.files;
      if(files.length === 0) return;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const dataUrl = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (event) => resolve(event.target.result);
          reader.readAsDataURL(file);
        });
        tempBase64Images.push(dataUrl);
      }
    });

    function b64EncodeUnicode(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function toSolidBytes(match, p1) { return String.fromCharCode('0x' + p1); }));
    }
    function b64DecodeUnicode(str) {
      return decodeURIComponent(atob(str).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
    }

    async function moveProductLocal(e, index, direction) {
      e.stopPropagation();
      if (direction === -1 && index > 0) {
        const temp = productList[index];
        productList[index] = productList[index - 1];
        productList[index - 1] = temp;
        renderProducts(); 
        await saveToGitHub("Ürün sırası değiştirildi (Yukarı)");
      } else if (direction === 1 && index < productList.length - 1) {
        const temp = productList[index];
        productList[index] = productList[index + 1];
        productList[index + 1] = temp;
        renderProducts(); 
        await saveToGitHub("Ürün sırası değiştirildi (Aşağı)");
      }
    }

    async function deleteProductLocal(e, index) {
      e.stopPropagation();
      if(confirm(`"${productList[index].name}" lezzetini menüden kaldırmak istediğinize emin misiniz?`)) {
        productList.splice(index, 1);
        await saveToGitHub("Ürün silindi");
      }
    }

    async function uploadImageToGitHubFolder(fileDataUrl, productName, imageIndex) {
      const repoOwner = "gokhangeo";
      const repoName = "guler-mutfak-lezzetleri";
      const tkn = getGithubToken();
      
      const base64Content = fileDataUrl.split(',')[1];
      const safeName = productName.toLowerCase()
                        .replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's')
                        .replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c')
                        .replace(/[^a-z0-9]/g, '_') + '_' + Date.now() + '_' + imageIndex;
      
      const filePath = `images/${safeName}.jpg`;
      const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`;

      try {
        const putRes = await fetch(apiUrl, {
          method: "PUT",
          headers: { "Authorization": `Bearer ${tkn}`, "Content-Type": "application/json" },
          body: JSON.stringify({
            message: `Admin: Yeni görsel eklendi -> ${safeName}.jpg`,
            content: base64Content,
            branch: "main"
          })
        });

        if (putRes.ok) { return filePath; } 
        else { console.error("Görsel yüklenemedi"); return null; }
      } catch (error) {
        console.error(error); return null;
      }
    }

    async function saveProduct() {
      const name = document.getElementById('admin-name').value;
      const category = document.getElementById('admin-category').value;
      const unit = document.getElementById('admin-unit').value || "Adet";
      const oldPrice = parseFloat(document.getElementById('admin-old-price').value);
      const newPriceStr = document.getElementById('admin-new-price').value;
      const discountPrice = newPriceStr ? parseFloat(newPriceStr) : null;
      const desc = document.getElementById('admin-desc').value;

      if(!name || !oldPrice) return alert("Lütfen Ürün Adı ve Fiyatı alanlarını doldurunuz!");

      document.getElementById('loader').style.display = 'flex';
      
      let finalImagePaths = [];

      if (tempBase64Images.length > 0) {
        // Yeni eklenen tüm görselleri GitHub'a yükle
        for (let i = 0; i < tempBase64Images.length; i++) {
          document.getElementById('loader-text').textContent = `Görsel ${i + 1}/${tempBase64Images.length} sisteme yükleniyor...`;
          const uploadedPath = await uploadImageToGitHubFolder(tempBase64Images[i], name, i);
          if (uploadedPath) finalImagePaths.push(uploadedPath);
        }
      } else {
        // Değişiklik yoksa eskisini koru
        if (editIndex > -1) {
          const existingImage = productList[editIndex].image;
          finalImagePaths = Array.isArray(existingImage) ? existingImage : [existingImage];
        } else {
          finalImagePaths = ["https://via.placeholder.com/300x200?text=Gorsel+Yok"];
        }
      }

      const newProd = {
        name: name.toUpperCase(), price: oldPrice, discount: discountPrice,
        category: category, unit: unit, image: finalImagePaths, desc: desc
      };
      
      if (editIndex > -1) {
        productList[editIndex] = newProd; 
      } else {
        productList.unshift(newProd); 
      }
      
      closeAdmin();
      await saveToGitHub(`Menü güncellendi: ${name}`);
    }

    async function saveToGitHub(commitMessage) {
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('loader-text').textContent = "Menü kaydediliyor, lütfen bekleyin...";
      
      const repoOwner = "gokhangeo";
      const repoName = "guler-mutfak-lezzetleri";
      const filePath = "data.json"; 
      const tkn = getGithubToken();
      const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`;

      try {
        const getRes = await fetch(`${apiUrl}?t=${Date.now()}`, {
          headers: { "Authorization": `Bearer ${tkn}` }
        });
        
        let sha = "";
        if (getRes.ok) {
           const fileData = await getRes.json();
           sha = fileData.sha;
        }
        
        const dataToSave = {
          campaignText: campaignText,
          products: productList
        };

        const jsonContent = JSON.stringify(dataToSave, null, 2);

        const putBody = {
          message: `Admin: ${commitMessage}`,
          content: b64EncodeUnicode(jsonContent),
          branch: "main"
        };
        
        if (sha) putBody.sha = sha;

        const putRes = await fetch(apiUrl, {
          method: "PUT",
          headers: { "Authorization": `Bearer ${tkn}`, "Content-Type": "application/json" },
          body: JSON.stringify(putBody)
        });

        if (putRes.ok) {
          renderProducts();
          showNotification("🎉 Değişiklikler anında menüye yansıdı!");
        } else {
          alert("Kayıt işlemi sırasında bir hata oluştu.");
        }
      } catch (error) {
        console.error(error);
        alert("İnternet bağlantınızda veya sistemde bir sorun oluştu.");
      } finally {
        document.getElementById('loader').style.display = 'none';
      }
    }
  </script>
